name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync environment
        run: uv sync --all-groups

      # Mirrors .pre-commit-config.yaml (single source of truth for lint/format/types).
      - name: Pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Pytest
        run: uv run pytest
