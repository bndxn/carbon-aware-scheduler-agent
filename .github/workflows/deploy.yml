# Requires repository secret: AWS_ROLE_ARN (deploy role ARN).
# Optional repository variables: AWS_REGION (default eu-west-2), LAMBDA_FUNCTION_NAME,
# SNAPSHOT_LAMBDA_FUNCTION_NAME, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID.
# Release job runs when at least one Lambda function name is set.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}

jobs:
  aws-oidc-smoke:
    name: Verify AWS OIDC
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Who am I
        run: aws sts get-caller-identity

  release:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: [aws-oidc-smoke]
    if: ${{ vars.LAMBDA_FUNCTION_NAME != '' || vars.SNAPSHOT_LAMBDA_FUNCTION_NAME != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda package
        run: |
          python -m pip install --upgrade pip
          python -m pip install . -t build/lambda
          cd build/lambda
          zip -r ../lambda.zip .

      - name: Update API Lambda code
        if: ${{ vars.LAMBDA_FUNCTION_NAME != '' }}
        env:
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file "fileb://build/lambda.zip" \
            --publish

      - name: Update snapshot Lambda code
        if: ${{ vars.SNAPSHOT_LAMBDA_FUNCTION_NAME != '' }}
        env:
          FUNCTION_NAME: ${{ vars.SNAPSHOT_LAMBDA_FUNCTION_NAME }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file "fileb://build/lambda.zip" \
            --publish

      - name: Sync static site to S3
        if: ${{ vars.S3_BUCKET != '' }}
        env:
          BUCKET: ${{ vars.S3_BUCKET }}
        run: aws s3 sync site/ "s3://$BUCKET/" --delete

      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          DIST: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"
