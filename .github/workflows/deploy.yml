# Requires repository secret: AWS_ROLE_ARN (deploy role ARN).
# Optional repository variables: AWS_REGION (default eu-west-2), ECR_REPOSITORY,
# ECS_CLUSTER, ECS_SERVICE, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID.
# Release job (image + optional ECS/S3/CF) runs only when ECR_REPOSITORY is set.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}

jobs:
  aws-oidc-smoke:
    name: Verify AWS OIDC
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Who am I
        run: aws sts get-caller-identity

  release:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: [aws-oidc-smoke]
    if: ${{ vars.ECR_REPOSITORY != '' }}
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR registry URL
        id: ecr_registry
        run: |
          account=$(aws sts get-caller-identity --query Account --output text)
          echo "uri=${account}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REPO: ${{ vars.ECR_REPOSITORY }}
          ECR_REGISTRY: ${{ steps.ecr_registry.outputs.uri }}
        run: |
          docker build -t "$ECR_REGISTRY/$REPO:$IMAGE_TAG" -t "$ECR_REGISTRY/$REPO:latest" .
          docker push "$ECR_REGISTRY/$REPO:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$REPO:latest"

      - name: Force new ECS deployment
        if: ${{ vars.ECS_CLUSTER != '' && vars.ECS_SERVICE != '' }}
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER }}
          SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --force-new-deployment

      - name: Sync static site to S3
        if: ${{ vars.S3_BUCKET != '' }}
        env:
          BUCKET: ${{ vars.S3_BUCKET }}
        run: aws s3 sync site/ "s3://$BUCKET/" --delete

      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        env:
          DIST: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"
