<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Carbon Aware Scheduler Agent</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 2rem;
        line-height: 1.5;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
      }
      h1 {
        margin-top: 0;
        color: #f8fafc;
      }
      .muted {
        color: #94a3b8;
      }
      code {
        background: #1e293b;
        padding: 0.15rem 0.35rem;
        border-radius: 4px;
      }
      a {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Carbon Aware Scheduler Agent</h1>
      <p class="muted">
        Static site deploy is active. Snapshot content is generated on a schedule and
        written to <code>snapshot.json</code>.
      </p>
      <p>
        API health endpoint:
        <a href="/health">/health</a>
      </p>
    </main>
  </body>
</html>
