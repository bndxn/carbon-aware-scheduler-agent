<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Carbon Aware Scheduler Agent</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 2rem;
        line-height: 1.55;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        max-width: 820px;
        margin: 0 auto;
      }
      h1 {
        margin-top: 0;
        color: #f8fafc;
        font-size: 1.75rem;
      }
      h2 {
        margin: 2rem 0 0.75rem;
        font-size: 1.1rem;
        font-weight: 600;
        color: #cbd5e1;
        letter-spacing: 0.02em;
      }
      .muted {
        color: #94a3b8;
        font-size: 0.95rem;
      }
      code {
        background: #1e293b;
        padding: 0.15rem 0.35rem;
        border-radius: 4px;
        font-size: 0.9em;
      }
      a {
        color: #7dd3fc;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        margin: 1rem 0 1.5rem;
      }
      button {
        cursor: pointer;
        border: 1px solid #334155;
        background: #1e293b;
        color: #e2e8f0;
        padding: 0.45rem 0.85rem;
        border-radius: 6px;
        font-size: 0.9rem;
      }
      button:hover {
        background: #334155;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .card {
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 10px;
        padding: 1.1rem 1.25rem;
        margin-bottom: 1rem;
      }
      .card.error {
        border-color: #7f1d1d;
        background: #1c1917;
        color: #fecaca;
      }
      .timestamp {
        font-size: 0.95rem;
        color: #cbd5e1;
        margin: 0;
      }
      .generated-time {
        display: block;
        font-size: 1.05rem;
        font-weight: 500;
        color: #f1f5f9;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.01em;
      }
      .generated-time-hint {
        display: block;
        margin-top: 0.45rem;
        font-size: 0.8rem;
        font-weight: 400;
        color: #64748b;
      }
      .prompt-text {
        color: #cbd5e1;
        font-size: 0.95rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .reply-md {
        color: #f1f5f9;
        font-size: 1rem;
        word-break: break-word;
      }
      .reply-md p {
        margin: 0.65em 0;
      }
      .reply-md p:first-child {
        margin-top: 0;
      }
      .reply-md p:last-child {
        margin-bottom: 0;
      }
      .reply-md h1,
      .reply-md h2,
      .reply-md h3 {
        margin: 1.1rem 0 0.45rem;
        font-weight: 600;
        color: #f8fafc;
        line-height: 1.3;
      }
      .reply-md h1 {
        font-size: 1.35rem;
      }
      .reply-md h2 {
        font-size: 1.2rem;
      }
      .reply-md h3 {
        font-size: 1.05rem;
        color: #e2e8f0;
      }
      .reply-md ul,
      .reply-md ol {
        margin: 0.5em 0 0.75em;
        padding-left: 1.35rem;
      }
      .reply-md li {
        margin: 0.25em 0;
      }
      .reply-md hr {
        border: 0;
        border-top: 1px solid #334155;
        margin: 1.15rem 0;
      }
      .reply-md strong {
        color: #f8fafc;
        font-weight: 600;
      }
      .reply-md a {
        word-break: break-all;
      }
      .reply-md blockquote {
        margin: 0.75em 0;
        padding-left: 1rem;
        border-left: 3px solid #475569;
        color: #cbd5e1;
      }
      .hidden {
        display: none !important;
      }
      .working-details {
        padding-top: 0.5rem;
      }
      .working-details > summary {
        cursor: pointer;
        list-style-position: outside;
        font-weight: 600;
        font-size: 1rem;
        color: #7dd3fc;
        user-select: none;
      }
      .working-details > summary::-webkit-details-marker {
        color: #94a3b8;
      }
      .working-details[open] > summary {
        margin-bottom: 0.75rem;
      }
      .working-panel {
        max-height: min(70vh, 36rem);
        overflow: auto;
        padding-right: 0.25rem;
      }
      .working-step {
        margin-bottom: 1.35rem;
      }
      .working-step:last-child {
        margin-bottom: 0;
      }
      .working-step h4 {
        margin: 0 0 0.4rem;
        font-size: 0.78rem;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .working-step pre {
        margin: 0;
        padding: 0.65rem 0.75rem;
        background: #020617;
        border: 1px solid #1e293b;
        border-radius: 6px;
        font-size: 0.78rem;
        line-height: 1.45;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Carbon Aware Scheduler Agent</h1>
      <p class="muted">
        Snapshot content is generated on a schedule and stored as
        <code>snapshot.json</code>. This page loads it automatically (no LLM call on each
        page view).
      </p>
      <div class="toolbar">
        <button type="button" id="refresh-btn">Refresh snapshot</button>
        <a href="/snapshot.json">View raw JSON</a>
      </div>

      <div id="status" class="card">Loading snapshot…</div>
      <div id="content" class="hidden">
        <div class="card">
          <h2>Generated</h2>
          <p id="generated-at" class="timestamp"></p>
        </div>
        <div class="card">
          <h2>Prompt</h2>
          <p id="prompt" class="prompt-text"></p>
        </div>
        <div class="card">
          <h2>Reply</h2>
          <div id="reply" class="reply-md"></div>
        </div>
        <details id="working-details" class="card working-details hidden">
          <summary>See my working</summary>
          <div id="working-panel" class="working-panel"></div>
        </details>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      (function () {
        const statusEl = document.getElementById("status");
        const contentEl = document.getElementById("content");
        const generatedAtEl = document.getElementById("generated-at");
        const promptEl = document.getElementById("prompt");
        const replyEl = document.getElementById("reply");
        const workingDetailsEl = document.getElementById("working-details");
        const workingPanelEl = document.getElementById("working-panel");
        const refreshBtn = document.getElementById("refresh-btn");

        function setReplyMarkdown(md) {
          if (typeof marked !== "undefined" && typeof DOMPurify !== "undefined") {
            marked.setOptions({ gfm: true });
            replyEl.innerHTML = DOMPurify.sanitize(marked.parse(md));
          } else {
            replyEl.textContent = md;
          }
        }

        function setGeneratedAt(iso) {
          generatedAtEl.textContent = "";
          const d = new Date(iso);
          if (Number.isNaN(d.getTime())) {
            generatedAtEl.textContent = iso;
            return;
          }
          const london = new Intl.DateTimeFormat("en-GB", {
            timeZone: "Europe/London",
            weekday: "long",
            day: "numeric",
            month: "long",
            year: "numeric",
            hour: "numeric",
            minute: "2-digit",
            second: "2-digit",
            timeZoneName: "short",
          }).format(d);
          const utc = new Intl.DateTimeFormat("en-GB", {
            timeZone: "UTC",
            hour: "numeric",
            minute: "2-digit",
            second: "2-digit",
            timeZoneName: "short",
          }).format(d);
          const time = document.createElement("time");
          time.dateTime = iso;
          time.className = "generated-time";
          time.textContent = london;
          time.title = "Snapshot written at " + iso;
          generatedAtEl.appendChild(time);
          const hint = document.createElement("span");
          hint.className = "generated-time-hint";
          hint.textContent = utc + " · hover for exact ISO timestamp";
          generatedAtEl.appendChild(hint);
        }

        function showError(message) {
          statusEl.className = "card error";
          statusEl.textContent = message;
          contentEl.classList.add("hidden");
        }

        function showLoading() {
          statusEl.className = "card";
          statusEl.textContent = "Loading snapshot…";
          contentEl.classList.add("hidden");
          workingDetailsEl.classList.add("hidden");
          workingDetailsEl.open = false;
          refreshBtn.disabled = true;
        }

        function renderWorking(trace) {
          workingPanelEl.textContent = "";
          if (!Array.isArray(trace) || trace.length === 0) {
            workingDetailsEl.classList.add("hidden");
            return;
          }
          workingDetailsEl.classList.remove("hidden");
          for (let i = 0; i < trace.length; i++) {
            const step = trace[i];
            const section = document.createElement("section");
            section.className = "working-step";
            const title = document.createElement("h4");
            const pre = document.createElement("pre");
            const t = step && step.type;
            if (t === "system_prompt") {
              title.textContent = "System instructions (sent to the model)";
              pre.textContent = step.content;
            } else if (t === "user_prompt") {
              title.textContent = "Scheduled prompt";
              pre.textContent = step.content;
            } else if (t === "meta") {
              title.textContent = "Run metadata & external services";
              pre.textContent = JSON.stringify(step, null, 2);
            } else if (t === "bedrock_assistant") {
              title.textContent =
                "Model turn " +
                step.round +
                " — stop_reason: " +
                (step.stop_reason || "?");
              pre.textContent = JSON.stringify(step.content, null, 2);
            } else if (t === "tool_results") {
              title.textContent =
                "Tool calls & results (round " + (step.round || "?") + ")";
              pre.textContent = JSON.stringify(step.calls, null, 2);
            } else if (t === "error") {
              title.textContent = "Run error";
              pre.textContent = String(step.message || step);
            } else {
              title.textContent = t ? String(t) : "Step " + (i + 1);
              pre.textContent = JSON.stringify(step, null, 2);
            }
            section.appendChild(title);
            section.appendChild(pre);
            workingPanelEl.appendChild(section);
          }
        }

        async function loadSnapshot() {
          showLoading();
          try {
            const res = await fetch("/snapshot.json", { cache: "no-store" });
            if (!res.ok) {
              showError(
                "Could not load snapshot (" +
                  res.status +
                  "). If you just deployed, wait for the next snapshot run or invoke the snapshot Lambda once."
              );
              return;
            }
            const data = await res.json();
            if (
              typeof data.generated_at !== "string" ||
              typeof data.prompt !== "string" ||
              typeof data.reply !== "string"
            ) {
              showError("snapshot.json has an unexpected shape.");
              return;
            }
            setGeneratedAt(data.generated_at);
            promptEl.textContent = data.prompt;
            setReplyMarkdown(data.reply);
            renderWorking(Array.isArray(data.working) ? data.working : []);
            statusEl.classList.add("hidden");
            contentEl.classList.remove("hidden");
          } catch (e) {
            showError("Network error loading snapshot.json.");
          } finally {
            refreshBtn.disabled = false;
          }
        }

        refreshBtn.addEventListener("click", loadSnapshot);
        loadSnapshot();
      })();
    </script>
  </body>
</html>
