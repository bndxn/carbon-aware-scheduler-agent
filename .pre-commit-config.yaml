# Hooks use `uv run` so tool versions match uv.lock (sync dev deps first).

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check --fix --force-exclude
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format --force-exclude
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy .
        pass_filenames: false
        always_run: true
